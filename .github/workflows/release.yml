name: build

# 打 v* 标签或手动触发时,编译 x86_64 musl 静态二进制并发布到 GitHub Release。
# 静态链接,跨发行版通用,服务器无需装 rust/编译,直接下载替换。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-musl:
    runs-on: ubuntu-latest
    env:
      CC_x86_64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Test
        run: cargo test --release

      - name: Build (musl static)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf hanabi-x86_64-linux-musl.tar.gz hanabi
          sha256sum hanabi-x86_64-linux-musl.tar.gz > hanabi-x86_64-linux-musl.tar.gz.sha256
          ls -la hanabi-x86_64-linux-musl.tar.gz*

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-unknown-linux-musl/release/hanabi-x86_64-linux-musl.tar.gz
            target/x86_64-unknown-linux-musl/release/hanabi-x86_64-linux-musl.tar.gz.sha256
