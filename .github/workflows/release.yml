name: build

# push/PR 跑 lint+test;打 v* 标签时额外编译 musl 静态二进制(x86_64 + aarch64)并发布 Release。
# 静态链接,跨发行版通用,服务器无需装 rust/编译,直接下载替换。
on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  build-musl:
    runs-on: ubuntu-latest
    # aarch64-musl 需正经 musl 交叉工具链(gcc-cross 编 sqlite3.c 会引 glibc 专有符号
    # open64/__memset_chk 等, 链 musl 时 undefined reference)。先只出 x86_64; aarch64 后续用 zigbuild。
    env:
      CC_x86_64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Test
        run: cargo test --release

      - name: Build (musl static)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Package
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf hanabi-x86_64-unknown-linux-musl.tar.gz hanabi
          sha256sum hanabi-x86_64-unknown-linux-musl.tar.gz > hanabi-x86_64-unknown-linux-musl.tar.gz.sha256
          ls -la hanabi-x86_64-unknown-linux-musl.tar.gz*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-unknown-linux-musl/release/hanabi-x86_64-unknown-linux-musl.tar.gz
            target/x86_64-unknown-linux-musl/release/hanabi-x86_64-unknown-linux-musl.tar.gz.sha256

  docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/furinelle/hanabi
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
